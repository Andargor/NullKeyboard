plugins {
    id 'com.android.application'
}

android {
    namespace 'com.andargor.nullkeyboard'
    compileSdk 32 // Android 12L

    defaultConfig {
        applicationId "com.andargor.nullkeyboard"
        minSdk 21
        targetSdk 32 // Android 12L
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // ADD THIS BLOCK TO BYPASS GOOGLE PLAY CHECKS
    lint {
        // Prevents Lint from stopping the build when it finds policy/API warnings
        abortOnError false
        checkReleaseBuilds false
        // Specifically tells lint to ignore the outdated target SDK warning
        disable 'ExpiredTargetSdkVersion'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}